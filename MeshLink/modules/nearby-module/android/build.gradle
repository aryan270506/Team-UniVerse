plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.sekirohub.nearbymodule'
version = '0.1.0'



android {
  namespace "com.sekirohub.nearbymodule"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.google.android.gms:play-services-nearby:18.7.0"
}
